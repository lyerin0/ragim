<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAGIM LOOKUP — 로블록스 유저 검색</title>
<style>
@font-face{
  font-family:'Galmuri11';
  src:url('https://cdn.jsdelivr.net/gh/quiple/galmuri@latest/dist/Galmuri11.woff2') format('woff2');
}
:root{
  --bg:#0d1017; --panel:#151a24; --panel2:#1b2230; --line:#28324a;
  --ink:#e8ecf4; --dim:#8b95ab; --accent:#3df08c; --accent2:#4aa8ff;
  --warn:#ffb84a; --bad:#ff5d5d;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Galmuri11','DungGeunMo',Consolas,monospace;
  min-height:100vh;
  background-image:radial-gradient(circle at 1px 1px, #1a2130 1px, transparent 0);
  background-size:26px 26px;
}
.wrap{max-width:960px;margin:0 auto;padding:32px 16px 80px}

/* ---------- header / search ---------- */
header{text-align:center;margin-bottom:28px}
header h1{font-size:28px;letter-spacing:2px;color:var(--accent)}
header h1 span{color:var(--accent2)}
header p{color:var(--dim);font-size:13px;margin-top:8px}
.searchbox{
  display:flex;gap:8px;max-width:560px;margin:20px auto 0;
}
.searchbox input{
  flex:1;background:var(--panel);border:2px solid var(--line);color:var(--ink);
  font-family:inherit;font-size:16px;padding:12px 14px;border-radius:4px;outline:none;
}
.searchbox input:focus{border-color:var(--accent)}
.searchbox button{
  background:var(--accent);color:#06130c;border:none;font-family:inherit;
  font-size:16px;padding:12px 22px;border-radius:4px;cursor:pointer;font-weight:bold;
}
.searchbox button:disabled{opacity:.5;cursor:wait}
.status{text-align:center;color:var(--dim);font-size:13px;margin-top:12px;min-height:18px}
.status.err{color:var(--bad)}

/* ---------- profile card ---------- */
.card{
  background:var(--panel);border:2px solid var(--line);border-radius:8px;
  padding:20px;margin-top:20px;
}
.profile{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.avatarBox{
  width:180px;height:180px;background:var(--panel2);border:2px solid var(--line);
  border-radius:8px;overflow:hidden;flex-shrink:0;position:relative;
  background-image:radial-gradient(circle at 6px 6px,#232c3f 3px,transparent 0);
  background-size:24px 24px;
}
.avatarBox img{width:100%;height:100%;object-fit:cover;image-rendering:auto}
.pInfo{flex:1;min-width:240px}
.pInfo .dname{font-size:24px;color:var(--ink)}
.pInfo .uname{font-size:14px;color:var(--dim);margin-top:2px}
.pInfo .desc{
  font-size:13px;color:var(--dim);margin-top:12px;line-height:1.6;
  white-space:pre-wrap;max-height:120px;overflow:auto;
}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.stat{
  background:var(--panel2);border:1px solid var(--line);border-radius:4px;
  padding:8px 12px;font-size:12px;color:var(--dim);
}
.stat b{display:block;color:var(--accent);font-size:16px;margin-top:2px}
.metaRow{margin-top:14px;font-size:13px;color:var(--dim);line-height:1.9}
.metaRow b{color:var(--ink)}
.tag{display:inline-block;background:var(--panel2);border:1px solid var(--line);
  border-radius:3px;padding:2px 8px;font-size:12px;margin-left:6px}
.tag.on{color:var(--accent);border-color:var(--accent)}
.tag.off{color:var(--dim)}
.tag.banned{color:var(--bad);border-color:var(--bad)}

/* ---------- sections ---------- */
.sec{margin-top:20px}
.sec h2{
  font-size:15px;color:var(--accent2);border-bottom:2px solid var(--line);
  padding-bottom:8px;margin-bottom:12px;letter-spacing:1px;
}
.sec h2 small{color:var(--dim);font-size:12px;margin-left:8px}
.secBody{min-height:24px}
.loading{color:var(--dim);font-size:13px}
.empty{color:var(--dim);font-size:13px}
.hidden{display:none}

/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tabs button{
  background:var(--panel2);border:1px solid var(--line);color:var(--dim);
  font-family:inherit;font-size:13px;padding:6px 14px;border-radius:4px;cursor:pointer;
}
.tabs button.active{color:#06130c;background:var(--accent);border-color:var(--accent)}

/* user grid */
.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
.ucell{
  background:var(--panel2);border:1px solid var(--line);border-radius:6px;
  padding:8px;text-align:center;text-decoration:none;color:var(--ink);
}
.ucell:hover{border-color:var(--accent)}
.ucell img{width:64px;height:64px;border-radius:4px;background:#0a0d13}
.ucell .n{font-size:11px;margin-top:6px;word-break:break-all;color:var(--ink)}
.ucell .d{font-size:10px;color:var(--dim)}

/* item grid (games, badges, favorites, groups) */
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.icell{
  background:var(--panel2);border:1px solid var(--line);border-radius:6px;
  overflow:hidden;text-decoration:none;color:var(--ink);display:block;
}
.icell:hover{border-color:var(--accent2)}
.icell img{width:100%;aspect-ratio:1;object-fit:cover;background:#0a0d13;display:block}
.icell .b{padding:8px}
.icell .t{font-size:12px;line-height:1.4;word-break:break-all}
.icell .s{font-size:11px;color:var(--dim);margin-top:4px}
.icell .s .rank{color:var(--warn)}

.more{color:var(--dim);font-size:12px;margin-top:10px}
footer{text-align:center;color:#3a4358;font-size:11px;margin-top:48px}

@media (max-width:520px){
  .avatarBox{width:120px;height:120px}
  .pInfo .dname{font-size:19px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>RAGIM <span>LOOKUP</span></h1>
    <p>로블록스 닉네임을 입력하면 프로필 정보를 조회합니다</p>
    <div class="searchbox">
      <input id="q" type="text" placeholder="로블록스 닉네임 또는 유저 ID" autocomplete="off">
      <button id="go">검색</button>
    </div>
    <div class="status" id="status"></div>
  </header>

  <div id="result" class="hidden">
    <!-- 프로필 카드 -->
    <div class="card">
      <div class="profile">
        <div class="avatarBox"><img id="avatar" alt="아바타"></div>
        <div class="pInfo">
          <div class="dname" id="displayName"></div>
          <div class="uname" id="userName"></div>
          <div class="metaRow" id="metaRow"></div>
          <div class="stats">
            <div class="stat">친구<b id="cFriends">-</b></div>
            <div class="stat">팔로워<b id="cFollowers">-</b></div>
            <div class="stat">팔로잉<b id="cFollowings">-</b></div>
          </div>
          <div class="desc" id="desc"></div>
        </div>
      </div>
    </div>

    <!-- 친구/팔로워/팔로잉 -->
    <div class="card sec">
      <h2>소셜 <small>친구 · 팔로워 · 팔로잉</small></h2>
      <div class="tabs">
        <button data-tab="friends" class="active">친구</button>
        <button data-tab="followers">팔로워</button>
        <button data-tab="followings">팔로잉</button>
      </div>
      <div class="secBody" id="socialBody"><div class="loading">불러오는 중...</div></div>
    </div>

    <!-- 만든 게임 -->
    <div class="card sec">
      <h2>만든 게임</h2>
      <div class="secBody" id="gamesBody"><div class="loading">불러오는 중...</div></div>
    </div>

    <!-- 배지 -->
    <div class="card sec">
      <h2>배지 <small>최근 획득순 · 최대 30개 표시</small></h2>
      <div class="secBody" id="badgesBody"><div class="loading">불러오는 중...</div></div>
    </div>

    <!-- 즐겨찾기 -->
    <div class="card sec">
      <h2>즐겨찾기한 게임</h2>
      <div class="secBody" id="favsBody"><div class="loading">불러오는 중...</div></div>
    </div>

    <!-- 인벤토리 -->
    <div class="card sec" id="invSec">
      <h2>인벤토리 <small>수집품(콜렉터블)</small></h2>
      <div class="secBody" id="invBody"><div class="loading">불러오는 중...</div></div>
    </div>

    <!-- 커뮤니티 -->
    <div class="card sec">
      <h2>커뮤니티 <small>가입한 그룹과 등급</small></h2>
      <div class="secBody" id="groupsBody"><div class="loading">불러오는 중...</div></div>
    </div>
  </div>

  <footer>비공식 조회 도구 · Roblox 공개 API 사용 · Roblox Corporation과 무관합니다</footer>
</div>

<script>
/* ============ 프록시 설정 ============ */
/* ★★★ Cloudflare Worker를 만들었다면 그 주소를 여기 따옴표 안에 넣으세요 ★★★
   예: const MY_PROXY = 'https://ragim-proxy.lyerin0.workers.dev';
   비워두면 공개 프록시(느리고 자주 막힘)를 대신 사용합니다 */
const MY_PROXY = 'https://ragim.iloowaboy.workers.dev';

/* 공개 프록시 (MY_PROXY가 비어있을 때만 사용, GET 전용) */
const GET_PROXIES = [
  u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
];
let rr = 0; // 요청을 프록시들에 분산시키기 위한 카운터

/* 요청을 줄 세워 300ms 간격으로 하나씩 내보냄 (공개 프록시 속도 제한 회피) */
let queue = Promise.resolve();
function nextSlot(){
  const p = queue.then(() => new Promise(r => setTimeout(r, 300)));
  queue = p.catch(() => {});
  return p;
}

function fetchTimeout(url, opts, ms){
  /* AbortSignal은 일부 환경(미리보기 샌드박스)에서 안 되므로 Promise.race 사용 */
  return Promise.race([
    fetch(url, opts),
    new Promise((_, rej) => setTimeout(() => rej(new Error('시간 초과')), ms))
  ]);
}

/* https://users.roblox.com/v1/... → MY_PROXY/users/v1/... 로 변환 */
function toWorkerUrl(u){
  const m = u.match(/^https:\/\/([a-z]+)\.roblox\.com(\/.*)$/);
  if(!m) return u;
  return MY_PROXY.replace(/\/+$/, '') + '/' + m[1] + m[2];
}

async function api(url, opts){
  /* 전용 워커가 있으면 그걸로 (빠르고 POST도 가능) */
  if(MY_PROXY){
    const res = await fetchTimeout(toWorkerUrl(url), opts, 12000);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  }
  /* 없으면 공개 프록시 (GET만 가능) */
  if(opts && opts.method === 'POST') throw new Error('전용 프록시 필요');
  await nextSlot();
  const start = rr++ % GET_PROXIES.length;
  let lastErr;
  for(let i = 0; i < GET_PROXIES.length; i++){
    const p = GET_PROXIES[(start + i) % GET_PROXIES.length];
    try{
      const res = await fetchTimeout(p(url), undefined, 12000);
      if(!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('요청 실패');
}

/* ============ 유틸 ============ */
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate = iso => {
  if(!iso) return '알 수 없음';
  const d = new Date(iso);
  return d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일';
};
const fmtAgo = iso => {
  if(!iso) return '';
  const s = (Date.now() - new Date(iso)) / 1000;
  if(s < 60) return '방금 전';
  if(s < 3600) return Math.floor(s/60) + '분 전';
  if(s < 86400) return Math.floor(s/3600) + '시간 전';
  if(s < 2592000) return Math.floor(s/86400) + '일 전';
  if(s < 31536000) return Math.floor(s/2592000) + '개월 전';
  return Math.floor(s/31536000) + '년 전';
};
const num = n => (n ?? 0).toLocaleString('ko-KR');

/* 배치 썸네일 */
async function headshots(ids){
  const map = {};
  for(let i = 0; i < ids.length; i += 100){
    const chunk = ids.slice(i, i+100);
    try{
      const j = await api('https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=' + chunk.join(',') + '&size=100x100&format=Png');
      (j.data || []).forEach(t => map[t.targetId] = t.imageUrl);
    }catch(e){}
  }
  return map;
}
async function batchThumbs(endpoint, param, ids){
  const map = {};
  for(let i = 0; i < ids.length; i += 100){
    const chunk = ids.slice(i, i+100);
    try{
      const j = await api('https://thumbnails.roblox.com/v1/' + endpoint + '?' + param + '=' + chunk.join(',') + '&size=150x150&format=Png');
      (j.data || []).forEach(t => map[t.targetId] = t.imageUrl);
    }catch(e){}
  }
  return map;
}

/* ============ 렌더러 ============ */
async function renderUserList(el, users, totalCount){
  if(!users || users.length === 0){ el.innerHTML = '<div class="empty">표시할 유저가 없습니다.</div>'; return; }
  const thumbs = await headshots(users.map(u => u.id));
  let html = '<div class="ugrid">';
  for(const u of users){
    html += '<a class="ucell" href="https://www.roblox.com/users/' + u.id + '/profile" target="_blank" rel="noopener">'
      + '<img loading="lazy" src="' + esc(thumbs[u.id] || '') + '" alt="">'
      + '<div class="n">' + esc(u.displayName || u.name) + '</div>'
      + '<div class="d">@' + esc(u.name) + '</div></a>';
  }
  html += '</div>';
  if(totalCount != null && totalCount > users.length){
    html += '<div class="more">전체 ' + num(totalCount) + '명 중 ' + users.length + '명 표시</div>';
  }
  el.innerHTML = html;
}

function itemCell(link, img, title, sub){
  return '<a class="icell" href="' + esc(link) + '" target="_blank" rel="noopener">'
    + '<img loading="lazy" src="' + esc(img || '') + '" alt="">'
    + '<div class="b"><div class="t">' + esc(title) + '</div>'
    + (sub ? '<div class="s">' + sub + '</div>' : '') + '</div></a>';
}

/* ============ 메인 검색 ============ */
let socialCache = {};

async function search(){
  const name = $('q').value.trim();
  if(!name) return;
  const btn = $('go'); btn.disabled = true;
  $('status').className = 'status';
  $('status').textContent = '유저를 찾는 중...';
  $('result').classList.add('hidden');
  socialCache = {};

  try{
    /* 1. 닉네임 → 유저 ID (숫자를 입력하면 유저 ID로 간주) */
    let userId = null;
    if(/^\d+$/.test(name)){
      userId = name;
    }else{
      if(MY_PROXY){
        /* 전용 프록시가 있으면 정확한 닉네임 조회 (POST) */
        try{
          const j = await api('https://users.roblox.com/v1/usernames/users', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({usernames:[name], excludeBannedUsers:false})
          });
          if(j.data && j.data.length) userId = j.data[0].id;
        }catch(e){}
      }
      if(!userId){
        const j = await api('https://users.roblox.com/v1/users/search?keyword=' + encodeURIComponent(name) + '&limit=10');
        const hit = (j.data || []).find(u => u.name.toLowerCase() === name.toLowerCase()) || (j.data || [])[0];
        if(hit) userId = hit.id;
      }
    }
    if(!userId) throw new Error('그런 닉네임의 유저를 찾을 수 없어요.');

    /* 2. 기본 정보 */
    $('status').textContent = '프로필 불러오는 중...';
    const info = await api('https://users.roblox.com/v1/users/' + userId);

    $('displayName').textContent = info.displayName || info.name;
    $('userName').textContent = '@' + info.name + '  ·  ID ' + userId;
    $('desc').textContent = info.description || '';
    $('desc').style.display = info.description ? '' : 'none';

    let meta = '계정 생성일 <b>' + fmtDate(info.created) + '</b> (' + fmtAgo(info.created) + ')';
    if(info.isBanned) meta += '<span class="tag banned">차단된 계정</span>';
    if(info.hasVerifiedBadge) meta += '<span class="tag on">인증 배지</span>';
    meta += '<br>마지막 접속 <b id="lastOnline">확인 중...</b>';
    $('metaRow').innerHTML = meta;

    $('result').classList.remove('hidden');
    $('status').textContent = '';

    /* 3. 아바타 */
    api('https://thumbnails.roblox.com/v1/users/avatar?userIds=' + userId + '&size=420x420&format=Png')
      .then(j => { if(j.data && j.data[0]) $('avatar').src = j.data[0].imageUrl; })
      .catch(()=>{});

    /* 4. 마지막 접속 - 전용 프록시가 있어야 조회 가능 (POST 필요) */
    if(MY_PROXY){
      api('https://presence.roblox.com/v1/presence/last-online', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({userIds:[Number(userId)]})
      }).then(j => {
        const lo = j.lastOnlineTimestamps && j.lastOnlineTimestamps[0];
        $('lastOnline').textContent = lo && lo.lastOnline ? fmtDate(lo.lastOnline) + ' (' + fmtAgo(lo.lastOnline) + ')' : '비공개';
      }).catch(() => { $('lastOnline').textContent = '확인 불가'; });
    }else{
      $('lastOnline').textContent = '비공개 (전용 프록시 설정 시 표시)';
    }

    /* 5. 소셜 카운트 */
    ['friends','followers','followings'].forEach(kind => {
      api('https://friends.roblox.com/v1/users/' + userId + '/' + kind + '/count')
        .then(j => $('c' + kind[0].toUpperCase() + kind.slice(1)).textContent = num(j.count))
        .catch(() => {});
    });

    /* 6. 소셜 리스트 (탭) */
    loadSocial(userId, 'friends');
    document.querySelectorAll('.tabs button').forEach(b => {
      b.onclick = () => {
        document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        loadSocial(userId, b.dataset.tab);
      };
    });

    /* 7. 만든 게임 */
    loadGames(userId);
    /* 8. 배지 */
    loadBadges(userId);
    /* 9. 즐겨찾기 */
    loadFavorites(userId);
    /* 10. 인벤토리 */
    loadInventory(userId);
    /* 11. 커뮤니티 */
    loadGroups(userId);

  }catch(e){
    $('status').className = 'status err';
    $('status').textContent = (e && e.message === 'Failed to fetch')
      ? '연결에 실패했어요. 프록시가 일시적으로 막힌 것일 수 있으니 몇 초 뒤 다시 검색해보세요.'
      : (e.message || '오류가 발생했어요. 잠시 후 다시 시도해주세요.');
  }finally{
    btn.disabled = false;
  }
}

async function loadSocial(userId, kind){
  const el = $('socialBody');
  if(socialCache[kind]){ el.innerHTML = socialCache[kind]; return; }
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  try{
    let users, total = null;
    if(kind === 'friends'){
      const j = await api('https://friends.roblox.com/v1/users/' + userId + '/friends');
      users = (j.data || []).slice(0, 100);
      total = (j.data || []).length;
    }else{
      const j = await api('https://friends.roblox.com/v1/users/' + userId + '/' + kind + '?limit=100&sortOrder=Desc');
      users = j.data || [];
      try{
        const c = await api('https://friends.roblox.com/v1/users/' + userId + '/' + kind + '/count');
        total = c.count;
      }catch(e){}
    }
    await renderUserList(el, users, total);
    socialCache[kind] = el.innerHTML;
  }catch(e){
    el.innerHTML = '<div class="empty">목록을 불러올 수 없어요 (비공개이거나 일시적 오류).</div>';
  }
}

async function loadGames(userId){
  const el = $('gamesBody');
  try{
    const j = await api('https://games.roblox.com/v2/users/' + userId + '/games?accessFilter=2&limit=50&sortOrder=Asc');
    const games = j.data || [];
    if(games.length === 0){ el.innerHTML = '<div class="empty">공개된 게임이 없습니다.</div>'; return; }
    const thumbs = await batchThumbs('games/icons', 'universeIds', games.map(g => g.id));
    el.innerHTML = '<div class="igrid">' + games.map(g =>
      itemCell(
        'https://www.roblox.com/games/' + (g.rootPlace ? g.rootPlace.id : ''),
        thumbs[g.id],
        g.name,
        '방문 ' + num(g.placeVisits) + '회'
      )).join('') + '</div>';
  }catch(e){ el.innerHTML = '<div class="empty">게임 목록을 불러올 수 없어요.</div>'; }
}

async function loadInventory(userId){
  const el = $('invBody');
  try{
    const v = await api('https://inventory.roblox.com/v1/users/' + userId + '/can-view-inventory');
    if(!v.canView){
      /* 비공개면 섹션 자체를 숨김 */
      $('invSec').classList.add('hidden');
      return;
    }
    const j = await api('https://inventory.roblox.com/v1/users/' + userId + '/assets/collectibles?limit=100&sortOrder=Desc');
    const items = j.data || [];
    if(items.length === 0){ el.innerHTML = '<div class="empty">보유한 수집품이 없습니다.</div>'; return; }
    const thumbs = await batchThumbs('assets', 'assetIds', items.map(i => i.assetId));
    el.innerHTML = '<div class="igrid">' + items.map(i =>
      itemCell(
        'https://www.roblox.com/catalog/' + i.assetId,
        thumbs[i.assetId],
        i.name,
        i.recentAveragePrice ? 'RAP ' + num(i.recentAveragePrice) : ''
      )).join('') + '</div>';
  }catch(e){
    $('invSec').classList.add('hidden');
  }
}

async function loadGroups(userId){
  const el = $('groupsBody');
  try{
    const j = await api('https://groups.roblox.com/v2/users/' + userId + '/groups/roles');
    const groups = j.data || [];
    if(groups.length === 0){ el.innerHTML = '<div class="empty">가입한 커뮤니티가 없습니다.</div>'; return; }
    const thumbs = await batchThumbs('groups/icons', 'groupIds', groups.map(g => g.group.id));
    el.innerHTML = '<div class="igrid">' + groups.map(g =>
      itemCell(
        'https://www.roblox.com/groups/' + g.group.id,
        thumbs[g.group.id],
        g.group.name,
        '등급: <span class="rank">' + esc(g.role ? g.role.name : '?') + '</span>'
        + (g.group.memberCount ? ' · 멤버 ' + num(g.group.memberCount) : '')
      )).join('') + '</div>';
  }catch(e){ el.innerHTML = '<div class="empty">커뮤니티 목록을 불러올 수 없어요.</div>'; }
}
